<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Assessment</title>
    <link rel="stylesheet" href="startlevel.css">
</head>
<body>
    <div class="container">
        <div class="illustration">
            <div class="blob"></div>
            <div class="magnifying-glass">
                <div class="glass">
                    <div class="face">
                        <div class="hair"></div>
                        <div class="eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                </div>
                <div class="handle"></div>
            </div>
        </div>
        
        <h1 class="title">Let's find the perfect level to start your learning journey</h1>
        
        <p class="subtitle">The questionnaire shouldn't take more than 15 minutes.</p>
        
        <button class="cta-button" id="startBtn">Find my level</button>
    </div>

    <script src="startlevel.js"></script>
</body>
</html>
